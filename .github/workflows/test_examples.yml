name: Test Examples

on:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: true

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      notebooks: ${{ steps.find-notebooks.outputs.notebooks }}
    steps:
      - uses: actions/checkout@v6

      - name: Find example notebooks
        id: find-notebooks
        run: |
          notebooks=$(ls docs/examples/*.ipynb | xargs -n1 basename | jq -R . | jq -sc .)
          echo "notebooks=$notebooks" >> $GITHUB_OUTPUT

  run-notebook:
    needs: generate-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        notebook: ${{ fromJson(needs.generate-matrix.outputs.notebooks) }}

    name: ${{ matrix.notebook }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "0.9.10"
          python-version: "3.14"

      - name: Install AIRBALL and dependencies
        run: uv sync

      - name: Convert notebook to script
        run: uv run python .github/workflows/scripts/convert_notebook.py docs/examples/${{ matrix.notebook }} notebook_script.py

      - name: Run ${{ matrix.notebook }}
        run: uv run python notebook_script.py
