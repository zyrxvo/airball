---
name: "Feature Request"
description: "Suggest a new feature or enhancement."
title: "[FEATURE] <short description>"
labels: [enhancement]
assignees: []
body:
  - type: markdown
    attributes:
      value: "## Feature Request\nPlease fill out the following information."
  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "A brief summary of the feature request."
      placeholder: "e.g., Add support for ..."
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: "Motivation"
      description: "Why is this feature important? What problem does it solve?"
      placeholder: "It would help because ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposed Solution"
      description: "Describe the solution you'd like."
      placeholder: "I propose ..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Have you considered any alternative solutions?"
      placeholder: "Alternatives are ..."
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: "Additional Context"
      description: "Add any other context, screenshots, or references here."
      placeholder: "Any other details..."
    validations:
      required: false
